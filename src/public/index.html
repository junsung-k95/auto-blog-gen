<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366F1" />
  <title>auto-blog-gen — 블로그 자동화 수익 스튜디오</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-mark">A</div>
        <span>auto-blog-gen</span>
      </div>

      <nav class="sidebar-nav" id="sidebarNav">
        <span class="nav-section-label">메인</span>
        <a class="nav-item" data-route="/dashboard"><span class="nav-icon">🏠</span><span>대시보드</span></a>
        <a class="nav-item" data-route="/discovery"><span class="nav-icon">🔍</span><span>키워드 발굴</span></a>
        <a class="nav-item" data-route="/write"><span class="nav-icon">✍️</span><span>작성</span></a>
        <a class="nav-item" data-route="/inbox"><span class="nav-icon">📋</span><span>검수 대기함</span></a>
        <a class="nav-item" data-route="/calendar"><span class="nav-icon">📅</span><span>발행 캘린더</span></a>

        <span class="nav-section-label">분석·수익</span>
        <a class="nav-item" data-route="/performance"><span class="nav-icon">📊</span><span>성과</span></a>
        <a class="nav-item" data-route="/revenue"><span class="nav-icon">💰</span><span>수익 관리</span></a>
        <a class="nav-item" data-route="/sponsors"><span class="nav-icon">🤝</span><span>협찬 보드</span></a>

        <span class="nav-section-label">시스템</span>
        <a class="nav-item" data-route="/settings"><span class="nav-icon">⚙️</span><span>설정</span></a>
      </nav>

      <div class="sidebar-footer">
        <span class="text-xs muted">v0.6.0 · M6</span>
        <button class="theme-toggle" id="themeToggle" title="테마 전환">🌙</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="flex items-center gap-3">
          <button class="btn-icon menu-toggle" id="menuToggle" aria-label="메뉴 열기">☰</button>
          <h1 class="topbar-title" id="topbarTitle">대시보드</h1>
        </div>
        <div class="topbar-actions">
          <select id="aiProvider" class="select" style="width:auto;padding:6px 12px;font-size:12px;">
            <option value="openai">GPT-4o</option>
            <option value="claude">Claude</option>
          </select>
          <button class="btn-icon notif-bell" aria-label="알림" id="notifBtn">
          🔔<span class="notif-badge" id="notifBadge" hidden></span>
        </button>
        </div>
      </header>

      <div class="content" id="viewRoot"></div>
    </main>
  </div>

  <nav class="mobile-tabs" id="mobileTabs">
    <a class="mobile-tab" data-route="/dashboard"><span class="mobile-tab-icon">🏠</span><span>홈</span></a>
    <a class="mobile-tab" data-route="/write"><span class="mobile-tab-icon">✍️</span><span>작성</span></a>
    <a class="mobile-tab" data-route="/calendar"><span class="mobile-tab-icon">📅</span><span>캘린더</span></a>
    <a class="mobile-tab" data-route="/revenue"><span class="mobile-tab-icon">💰</span><span>수익</span></a>
  </nav>

  <!-- Notification panel -->
  <div class="notif-panel" id="notifPanel" hidden>
    <div class="notif-panel-header">
      <span class="font-semibold">알림</span>
      <button class="btn-link text-xs" id="notifReadAll">모두 읽음</button>
    </div>
    <div class="notif-list" id="notifList"></div>
  </div>

  <!-- Onboarding overlay -->
  <div class="onboard-overlay" id="onboardOverlay" hidden>
    <div class="onboard-modal">
      <div class="onboard-steps" id="onboardSteps"></div>
      <div class="onboard-footer">
        <div class="onboard-dots" id="onboardDots"></div>
        <div class="flex gap-2">
          <button class="btn btn-ghost btn-sm" id="onboardSkip">건너뛰기</button>
          <button class="btn btn-primary btn-sm" id="onboardNext">다음</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PWA install prompt -->
  <div class="pwa-banner" id="pwaBanner" hidden>
    <span>📱 홈 화면에 추가하면 앱처럼 사용할 수 있어요!</span>
    <div class="flex gap-2">
      <button class="btn btn-primary btn-sm" id="pwaInstall">설치</button>
      <button class="btn btn-ghost btn-sm" id="pwaDismiss">닫기</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.3/Sortable.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
